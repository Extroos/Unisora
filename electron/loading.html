<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unisora</title>
  <style>
    body {
      background-color: #09090b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #fafafa;
      user-select: none;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .status-title {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      margin: 0;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .status-text {
      font-size: 11px;
      color: #71717a;
      margin: 0;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-title" id="status-title">Unisora</div>
    <div class="status-text" id="checking-status">Checking for updates</div>
  </div>

  <script>
    if (window.electronAPI && window.electronAPI.onUpdateMessage) {
      window.electronAPI.onUpdateMessage((message) => {
        const statusEl = document.getElementById('checking-status');
        if (statusEl) {
          statusEl.innerText = message.replace(/\.+$/, '').toUpperCase();
        }
      });
    }
  </script>
</body>
</html>
